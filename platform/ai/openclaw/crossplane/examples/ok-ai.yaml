# OpenClaw Claim — example (endpoint-free, per the component's convention)
# Real claims with the actual Ollama endpoint live in ok-cluster/openclaw/
# (concrete deployment values, not a component split — ok-cluster is public
# too). Submit to ok-mgmt.
apiVersion: platform.openkubes.ai/v1alpha1
kind: OpenClawClaim
metadata:
  name: ok-ai
  namespace: openkubes-system
spec:
  clusterRef: ok-ai
  ollamaEndpoint: http://OLLAMA_IP:11434   # Provider Value — replace
  namespace: openclaw
  model: gpt-oss:20b
  numCtx: 65536
