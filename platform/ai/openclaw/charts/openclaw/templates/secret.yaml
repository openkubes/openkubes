{{- if .Values.gateway.token }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  gateway-token: {{ .Values.gateway.token | quote }}
{{- else }}
{{- /* No token supplied: keep the existing Secret (helm upgrade without
       --set gateway.token must not wipe it). Fails on fresh install. */}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-gateway" .Release.Name) }}
{{- if not $existing }}
{{- fail "gateway.token is required on first install (use: make install / --set gateway.token=...)" }}
{{- end }}
{{- end }}
