{{- if .Values.rbac.create }}
# Read-only RBAC for the Cluster Inspection Contract implementation (kubectl).
# Derived from the Skill Contract, NOT from what the tool could do
# (guideline Part B: "the contract determines the required permissions").
#
# Rules:
#   - verbs are get/list/watch ONLY — never create/update/patch/delete
#   - secrets are NEVER included, in any apiGroup, under any skill
#   - if a skill appears to need more: STOP, guideline Part C (escalate)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-cluster-inspection-readonly
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/status
      - services
      - endpoints
      - events
      - nodes
      - namespaces
      - persistentvolumeclaims
      - persistentvolumes
      - resourcequotas
      - limitranges
      {{- if .Values.rbac.includeConfigMaps }}
      - configmaps
      {{- end }}
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-cluster-inspection-readonly
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-cluster-inspection-readonly
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
