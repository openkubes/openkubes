# OpenWebUI XRD — Platform Contract for Open WebUI deployments
# Allows teams to deploy Open WebUI on any workload cluster
# via a simple Claim, without knowing Helm internals.
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: openwebuiinstances.platform.openkubes.ai
spec:
  group: platform.openkubes.ai
  names:
    kind: OpenWebUIInstance
    plural: openwebuiinstances
  claimNames:
    kind: OpenWebUIClaim
    plural: openwebui
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - clusterRef
                - ollamaEndpoint
              properties:
                clusterRef:
                  type: string
                  description: "Name of the target cluster ProviderConfig (e.g. ok-ai)"
                ollamaEndpoint:
                  type: string
                  description: "Ollama API endpoint URL (e.g. http://<ollama-ip>:11434). Provider Value — no default here by convention."
                namespace:
                  type: string
                  description: "Namespace to deploy Open WebUI into"
                  default: "open-webui"
                version:
                  type: string
                  description: "Open WebUI Helm chart version"
                  default: "15.2.0"
                ingress:
                  type: boolean
                  description: "Expose via cluster ingress (ADR-Platform-010): ingressClassName ok-ingress, hostname open-webui.<clusterRef>.internal. Requires make install-ingress on the target cluster."
                  default: false
