# OpenWebUI Composition
# Deploys Open WebUI via Helm on the target workload cluster
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: openwebui.platform.openkubes.ai
  labels:
    provider: helm
spec:
  compositeTypeRef:
    apiVersion: platform.openkubes.ai/v1alpha1
    kind: OpenWebUIInstance
  mode: Pipeline
  pipeline:
    - step: deploy-open-webui
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: open-webui-helm-release
            base:
              apiVersion: helm.crossplane.io/v1beta1
              kind: Release
              spec:
                forProvider:
                  chart:
                    name: open-webui
                    repository: https://helm.openwebui.com/
                  namespace: open-webui
                  values:
                    ollama:
                      enabled: false
                    pipelines:
                      enabled: false
                    ingress:
                      enabled: false
                      class: ok-ingress
                      host: ""
                    extraEnvVars:
                      - name: OLLAMA_BASE_URL
                        value: "http://OLLAMA_IP:11434"  # always overridden by the patch below (spec.ollamaEndpoint is required)
                      - name: ENABLE_OLLAMA_API
                        value: "true"
                rollbackLimit: 3
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterRef
                toFieldPath: spec.providerConfigRef.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.namespace
                toFieldPath: spec.forProvider.namespace
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels[crossplane.io/claim-name]
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "open-webui-%s"
              - type: FromCompositeFieldPath
                fromFieldPath: spec.version
                toFieldPath: spec.forProvider.chart.version
              - type: FromCompositeFieldPath
                fromFieldPath: spec.ollamaEndpoint
                toFieldPath: spec.forProvider.values.extraEnvVars[0].value
              # Ingress contract (ADR-Platform-010): opt-in, class ok-ingress,
              # hostname open-webui.<clusterRef>.internal
              - type: FromCompositeFieldPath
                fromFieldPath: spec.ingress
                toFieldPath: spec.forProvider.values.ingress.enabled
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterRef
                toFieldPath: spec.forProvider.values.ingress.host
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "open-webui.%s.internal"
