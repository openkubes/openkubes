# OpenWebUI Claim — example (endpoint-free, per the component's convention)
# Real claims with the actual Ollama endpoint live in ok-cluster/ok-ai/
# (concrete deployment values, not a component split — ok-cluster is public
# too). Submit to ok-mgmt.
apiVersion: platform.openkubes.ai/v1alpha1
kind: OpenWebUIClaim
metadata:
  name: ok-ai
  namespace: openkubes-system
spec:
  clusterRef: ok-ai
  ollamaEndpoint: http://OLLAMA_IP:11434   # Provider Value — replace
  namespace: open-webui
  ingress: true  # → open-webui.ok-ai.internal via ok-ingress (ADR-Platform-010)
