apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: kubevirtcluster.platform.openkubes.ai
  labels:
    provider: kubevirt
spec:
  compositeTypeRef:
    apiVersion: platform.openkubes.ai/v1alpha1
    kind: KubeVirtCluster
  mode: Pipeline
  pipeline:
    - step: create-resources
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:

          # ConfigMap with deploy args — updated by Crossplane on every reconcile.
          # crossplane-deploy.sh reads KUBERNETES_VERSION from here and decides
          # whether to deploy a new cluster or delegate to crossplane-upgrade.sh.
          - name: deploy-args-configmap
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: in-cluster
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: ConfigMap
                    metadata:
                      namespace: openkubes-system
                    data: {}
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "deploy-args-%s"
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.forProvider.manifest.metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "deploy-args-%s"
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels[crossplane.io/claim-name]
                toFieldPath: spec.forProvider.manifest.data.CLUSTER_NAME
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels[crossplane.io/claim-name]
                toFieldPath: spec.forProvider.manifest.data.INFRA_CLUSTER_SECRET_NAMESPACE
              - type: FromCompositeFieldPath
                fromFieldPath: spec.country
                toFieldPath: spec.forProvider.manifest.data.COUNTRY
              - type: FromCompositeFieldPath
                fromFieldPath: spec.provider
                toFieldPath: spec.forProvider.manifest.data.PROVIDER
              - type: FromCompositeFieldPath
                fromFieldPath: spec.endpointIP
                toFieldPath: spec.forProvider.manifest.data.CONTROL_PLANE_ENDPOINT_IP
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cni
                toFieldPath: spec.forProvider.manifest.data.CNI_PLUGIN
              - type: FromCompositeFieldPath
                fromFieldPath: spec.multus
                toFieldPath: spec.forProvider.manifest.data.MULTUS_ENABLED
              - type: FromCompositeFieldPath
                fromFieldPath: spec.controlPlane.replicas
                toFieldPath: spec.forProvider.manifest.data.CONTROL_PLANE_REPLICAS
                transforms:
                  - type: convert
                    convert:
                      toType: string
              - type: FromCompositeFieldPath
                fromFieldPath: spec.workers.replicas
                toFieldPath: spec.forProvider.manifest.data.WORKER_REPLICAS
                transforms:
                  - type: convert
                    convert:
                      toType: string
              - type: FromCompositeFieldPath
                fromFieldPath: spec.controlPlane.kubernetesVersion
                toFieldPath: spec.forProvider.manifest.data.KUBERNETES_VERSION

          # Deploy Job — the name includes the Kubernetes version so that
          # Crossplane creates a NEW Job whenever kubernetesVersion changes.
          # (Kubernetes Jobs are immutable; a name change forces a new object.)
          - name: deploy-job
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: in-cluster
                forProvider:
                  manifest:
                    apiVersion: batch/v1
                    kind: Job
                    metadata:
                      namespace: openkubes-system
                    spec:
                      backoffLimit: 2
                      ttlSecondsAfterFinished: 600
                      template:
                        spec:
                          serviceAccountName: capi-platform-runner
                          restartPolicy: Never
                          containers:
                            - name: runner
                              image: kubernautslabs/capi-platform-runner:v4.2
                              imagePullPolicy: Always
                              command: ["/bin/bash", "/workspace/scripts/crossplane-deploy.sh"]
                              envFrom:
                                - configMapRef:
                                    name: deploy-args-placeholder
                              resources:
                                requests:
                                  cpu: 100m
                                  memory: 128Mi
                                limits:
                                  cpu: 500m
                                  memory: 256Mi
            patches:
              # Object name (Crossplane resource) — includes version to force new object
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.name
                    - fromFieldPath: spec.controlPlane.kubernetesVersion
                  strategy: string
                  string:
                    fmt: "deploy-%s-%s"
                toFieldPath: metadata.name
              # Job metadata.name — same combined value
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.name
                    - fromFieldPath: spec.controlPlane.kubernetesVersion
                  strategy: string
                  string:
                    fmt: "deploy-%s-%s"
                toFieldPath: spec.forProvider.manifest.metadata.name
              # Runner image
              - type: FromCompositeFieldPath
                fromFieldPath: spec.runnerImage
                toFieldPath: spec.forProvider.manifest.spec.template.spec.containers[0].image
              # ConfigMap reference — always points to the (version-independent) args ConfigMap
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.forProvider.manifest.spec.template.spec.containers[0].envFrom[0].configMapRef.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "deploy-args-%s"

    - step: cleanup-on-delete
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource }}
            {{- $name := $xr.metadata.name }}
            {{- $claimName := index $xr.metadata.labels "crossplane.io/claim-name" | default $xr.metadata.name }}
            {{- $spec := $xr.spec }}
            {{- $deleting := (ne (default "" $xr.metadata.deletionTimestamp) "") }}
            {{- if $deleting }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: cleanup-{{ $name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cleanup-job
            spec:
              providerConfigRef:
                name: in-cluster
              forProvider:
                manifest:
                  apiVersion: batch/v1
                  kind: Job
                  metadata:
                    name: cleanup-{{ $name }}
                    namespace: openkubes-system
                  spec:
                    backoffLimit: 1
                    ttlSecondsAfterFinished: 300
                    template:
                      spec:
                        serviceAccountName: capi-platform-runner
                        restartPolicy: Never
                        containers:
                          - name: runner
                            image: {{ default "kubernautslabs/capi-platform-runner:v4.2" $spec.runnerImage }}
                            imagePullPolicy: Always
                            command: ["/bin/bash", "/workspace/scripts/crossplane-cleanup.sh"]
                            env:
                              - name: COUNTRY
                                value: {{ default "de" $spec.country }}
                              - name: PROVIDER
                                value: {{ default "kubevirt" $spec.provider }}
                              - name: CLUSTER_NAME
                                value: {{ $claimName }}
                            resources:
                              requests:
                                cpu: 100m
                                memory: 128Mi
                              limits:
                                cpu: 500m
                                memory: 256Mi
            {{- end }}
