apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: kubevirtclustercleanups.platform.openkubes.ai
spec:
  group: platform.openkubes.ai
  names:
    kind: KubeVirtClusterCleanup
    plural: kubevirtclustercleanups
  claimNames:
    kind: KubeVirtClusterCleanupClaim
    plural: kubevirtclustercleanupsclaims
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - clusterName
              properties:
                clusterName:
                  type: string
                  description: "Name of the cluster to clean up (XR name with hash, e.g. ok1-gh5ms)"
                country:
                  type: string
                  default: de
                provider:
                  type: string
                  default: kubevirt
                runnerImage:
                  type: string
                  default: kubernautslabs/capi-platform-runner:v4.2
            status:
              type: object
              properties:
                phase:
                  type: string
