# ═══════════════════════════════════════════════════════════════════════════════
# OpenKubes – Crossplane ProviderConfigs for ok1 Workload Cluster
#
# Prerequisites:
#   kubectl create secret generic ok1-kubeconfig \
#     -n crossplane-system \
#     --from-file=kubeconfig=~/.kube/ok1.kubeconfig
#
# Apply once before using ok1-traefik.yaml or ok1-certmanager.yaml:
#   kubectl apply -f ok1-providerconfigs.yaml
# ═══════════════════════════════════════════════════════════════════════════════

# ── Helm ProviderConfig for ok1 ───────────────────────────────────────────────
apiVersion: helm.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: ok1-helm
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: ok1-kubeconfig
      key: kubeconfig
---
# ── Kubernetes ProviderConfig for ok1 ─────────────────────────────────────────
apiVersion: kubernetes.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: ok1-kubernetes
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: ok1-kubeconfig
      key: kubeconfig
