# Composite resource fixture for local rendering. Crossplane render consumes an
# XR rather than the namespaced Claim. The claim labels reproduce the metadata
# Crossplane adds when a Claim creates an XR.
apiVersion: platform.openkubes.ai/v1alpha1
kind: OpenRMFInstance
metadata:
  name: ok2-rmf-render
  labels:
    crossplane.io/claim-name: ok2-rmf
    crossplane.io/claim-namespace: openkubes-system
spec:
  clusterRef: ok2-rmf
  namespace: rmf
  mode: simulation
  hostname: rmf.openkubes.local
  credentialsSecretRef:
    name: rmf-credentials
    namespace: crossplane-system
