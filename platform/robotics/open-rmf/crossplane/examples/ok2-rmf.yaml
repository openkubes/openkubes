# OpenRMF simulation Claim for ok2-rmf.
#
# Do not apply until Crossplane function compatibility and the ownership
# handoff for the existing Helm release rmf are validated and approved.
apiVersion: platform.openkubes.ai/v1alpha1
kind: OpenRMFClaim
metadata:
  name: ok2-rmf
  namespace: openkubes-system
spec:
  clusterRef: ok2-rmf
  namespace: rmf
  mode: simulation
  hostname: rmf.openkubes.local
  credentialsSecretRef:
    name: rmf-credentials
    namespace: crossplane-system
