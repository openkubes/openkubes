apiVersion: platform.openkubes.ai/v1alpha1
kind: OpenKubesVMClaim
metadata:
  name: ok4
  namespace: openkubes-system
spec:
  namespace: kubevirt
  runStrategy: Always
  image:
    url: https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img
  compute:
    cores: 4
    memory: 4Gi
  storage:
    size: 30Gi
  network:
    clusterNetworkName: kubevirt/cluster-net
    clusterCIDR: "24"
    macAddress: "02:50:00:00:00:14"
  clusterIP: 192.168.50.14
  service:
    enabled: true
    type: LoadBalancer
    addressPool: first-pool
    loadBalancerIP: 84.200.100.228
    exposeKubernetesAPI: true
  cloudInit:
    user: ubuntu
    sshPublicKey: "ssh-rsa  arash@Arashs-MBP.fritz.box"
    password: ""
