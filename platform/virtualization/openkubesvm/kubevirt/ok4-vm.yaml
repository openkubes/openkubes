apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: ok4-dv
  namespace: kubevirt
spec:
  source:
    http:
      url: "https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
  pvc:
    accessModes:
      - ReadWriteOnce
    volumeMode: Filesystem
    resources:
      requests:
        storage: 30Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ok4-svc
  namespace: kubevirt
  annotations:
    metallb.io/address-pool: first-pool
    metallb.io/loadBalancerIPs: 84.200.100.228
spec:
  type: LoadBalancer
  selector:
    app: ok4-vm
  ports:
    - name: ssh
      protocol: TCP
      port: 22
      targetPort: 22
    - name: k8s-api
      protocol: TCP
      port: 6443
      targetPort: 6443
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: ok4-vm
  namespace: kubevirt
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/domain: ok4-vm
        app: ok4-vm
    spec:
      domain:
        cpu:
          cores: 4
        resources:
          requests:
            memory: 4Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
              ports:
                - name: ssh
                  port: 22
                - name: k8s-api
                  port: 6443
            - name: cluster
              bridge: {}
              macAddress: "02:50:00:00:00:14"
      networks:
        - name: default
          pod: {}
        - name: cluster
          multus:
            networkName: kubevirt/cluster-net
      volumes:
        - name: rootdisk
          dataVolume:
            name: ok4-dv
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              growpart:
                mode: auto
                devices: ["/"]
              resize_rootfs: true
              users:
                - name: ubuntu
                  sudo: ALL=(ALL) NOPASSWD:ALL
                  groups: sudo
                  shell: /bin/bash
                  lock_passwd: false
                  ssh_authorized_keys:
                    - ssh-rsa  arash@Arashs-MBP.fritz.box
              ssh_pwauth: true
              chpasswd:
                expire: false
                list: |
                  ubuntu:CHANGE_ME  # LAB ONLY — replace with secure password
            networkData: |
              version: 2
              ethernets:
                default0:
                  match:
                    name: enp1s0
                  set-name: enp1s0
                  dhcp4: true

                cluster0:
                  match:
                    macaddress: "02:50:00:00:00:14"
                  set-name: cluster0
                  dhcp4: false
                  addresses:
                    - 192.168.50.14/24