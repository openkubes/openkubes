# Build & push the OpenClaw+kubectl image (OK-15 Phase 1).
# Pattern: platform/cluster-management/capi-platform-v4.2/.github/workflows/build-runner.yaml
name: build-openclaw-kubectl

on:
  push:
    branches: [main]
    paths:
      - "platform/ai/openclaw/images/**"
      - ".github/workflows/build-openclaw-kubectl.yaml"
  pull_request:
    paths:
      - "platform/ai/openclaw/images/**"
      - ".github/workflows/build-openclaw-kubectl.yaml"

env:
  OPENCLAW_VERSION: "2026.7.1"
  KUBECTL_VERSION: "v1.34.1"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/openclaw-kubectl
          tags: |
            type=raw,value=${{ env.OPENCLAW_VERSION }}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: platform/ai/openclaw/images/openclaw-kubectl
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            OPENCLAW_VERSION=${{ env.OPENCLAW_VERSION }}
            KUBECTL_VERSION=${{ env.KUBECTL_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
