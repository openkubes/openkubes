<text x="340" y="283" text-anchor="middle" font-size="12" fill="#0F6E56">Pod network · eBPF dataplane · NetworkPolicy</text>

<line x1="340" y1="298" x2="340" y2="326" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- KubeVirt + MetalLB -->
<rect x="40" y="326" width="290" height="56" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text x="185" y="349" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">KubeVirt</text>
<text x="185" y="367" text-anchor="middle" font-size="12" fill="#534AB7">VM lifecycle · nested virt</text>
