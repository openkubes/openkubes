<text x="495" y="349" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">MetalLB</text>
<text x="495" y="367" text-anchor="middle" font-size="12" fill="#534AB7">L2 LoadBalancer · IP pool</text>

<line x1="185" y1="382" x2="185" y2="410" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="495" y1="382" x2="495" y2="410" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="185" y1="410" x2="495" y2="410" stroke="#888780" stroke-width="0.5"/>
<line x1="340" y1="410" x2="340" y2="438" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- CDI -->
<rect x="40" y="438" width="600" height="56" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="340" y="461" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">CDI · local-path-provisioner</text>
<text x="340" y="479" text-anchor="middle" font-size="12" fill="#0F6E56">VM image import · local storage for VMs</text>

<line x1="340" y1="494" x2="340" y2="522" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- socat -->
<rect x="40" y="522" width="600" height="56" rx="12" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text x="340" y="545" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">API proxy (socat)</text>
<text x="340" y="563" text-anchor="middle" font-size="12" fill="#854F0B">Permanent kubectl access · host-node port forward</text>

<line x1="340" y1="578" x2="340" y2="606" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Management cluster -->
<rect x="40" y="606" width="600" height="56" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="629" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">Management cluster (k3s)</text>
<text x="340" y="647" text-anchor="middle" font-size="12" fill="#712B13">3 KubeVirt VMs · MetalLB IPs · runs CAPI + Crossplane</text>

<text x="40" y="690" font-size="11" fill="#888780">Automation: Ansible role · Makefile targets (deploy, install, kubeconfig, check, reset)</text>
</svg>
