<svg width="680" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Bare-metal nodes -->
<rect x="40" y="20" width="600" height="110" rx="12" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="50" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Bare-metal nodes</text>
<text x="340" y="68" text-anchor="middle" font-size="12" fill="#5F5E5A">Layer-2 network · shared VLAN · private IP range</text>
<rect x="60" y="76" width="170" height="44" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text x="145" y="95" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Control-plane node</text>
<text x="145" y="111" text-anchor="middle" font-size="12" fill="#5F5E5A">high-memory server</text>
<rect x="255" y="76" width="170" height="44" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="95" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Worker node</text>
<text x="340" y="111" text-anchor="middle" font-size="12" fill="#5F5E5A">GPU-equipped server</text>
<rect x="450" y="76" width="170" height="44" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text x="535" y="95" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">VPN gateway</text>
<text x="535" y="111" text-anchor="middle" font-size="12" fill="#5F5E5A">WireGuard · public IP</text>

<line x1="340" y1="130" x2="340" y2="158" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- RKE2 -->
<rect x="40" y="158" width="600" height="56" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text x="340" y="181" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">RKE2 host cluster</text>
<text x="340" y="199" text-anchor="middle" font-size="12" fill="#534AB7">control-plane + etcd · worker · Kubernetes v1.35</text>

<line x1="340" y1="214" x2="340" y2="242" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Cilium -->
<rect x="40" y="242" width="600" height="56" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
