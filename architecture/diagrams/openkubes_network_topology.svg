<text x="340" y="58" text-anchor="middle" font-size="12" fill="#0C447C">WireGuard client · kubectl · SSH</text>

<text x="340" y="94" text-anchor="middle" font-size="12" fill="#5F5E5A">WireGuard tunnel (UDP)</text>
<line x1="340" y1="72" x2="340" y2="114" stroke="#378ADD" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="172" x2="340" y2="152" stroke="#378ADD" stroke-width="1" marker-end="url(#arrow)"/>

<!-- VPN gateway -->
