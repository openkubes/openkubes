<text x="340" y="152" text-anchor="middle" font-size="12" fill="#854F0B">WireGuard server · iptables MASQUERADE · public IP</text>

<!-- VLAN separator -->
<rect x="40" y="194" width="600" height="2" rx="1" fill="#D3D1C7"/>
<text x="340" y="216" text-anchor="middle" font-size="12" fill="#888780">Private VLAN · Layer-2 · 10.x.x.0/24</text>

