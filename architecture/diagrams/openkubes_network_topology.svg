<line x1="460" y1="172" x2="525" y2="238" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Bare-metal nodes -->
<rect x="40" y="238" width="270" height="66" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text x="175" y="260" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Control-plane node</text>
<text x="175" y="278" text-anchor="middle" font-size="12" fill="#534AB7">RKE2 server · etcd</text>
<text x="175" y="294" text-anchor="middle" font-size="12" fill="#534AB7">socat proxy → mgmt API</text>
<rect x="370" y="238" width="270" height="66" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
