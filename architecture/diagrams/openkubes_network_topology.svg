<text x="552" y="450" text-anchor="middle" font-size="12" fill="#712B13">worker · .202</text>

<line x1="340" y1="464" x2="340" y2="492" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Mgmt cluster API -->
<rect x="160" y="492" width="360" height="52" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="514" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">Management cluster API</text>
<text x="340" y="532" text-anchor="middle" font-size="12" fill="#712B13">k3s · reachable via control-plane socat proxy</text>

<text x="40" y="574" font-size="11" fill="#888780">kubectl path: workstation → WireGuard → VPN MASQUERADE → socat proxy → k3s API</text>
<text x="40" y="590" font-size="11" fill="#888780">SSH path: workstation → VPN gateway → Jump host → mgmt VM (ubuntu user)</text>
</svg>
