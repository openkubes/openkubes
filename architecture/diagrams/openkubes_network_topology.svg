<text x="505" y="294" text-anchor="middle" font-size="12" fill="#534AB7">KubeVirt workloads</text>

<line x1="175" y1="304" x2="175" y2="332" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="505" y1="304" x2="505" y2="332" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Cilium pod network -->
<rect x="40" y="332" width="600" height="52" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="340" y="354" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Cilium pod network</text>
<text x="340" y="372" text-anchor="middle" font-size="12" fill="#0F6E56">10.44.0.0/16 · KubeVirt VMs run inside this network</text>

<line x1="175" y1="384" x2="175" y2="412" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="384" x2="340" y2="412" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="505" y1="384" x2="505" y2="412" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Management VMs -->
<rect x="40" y="412" width="176" height="52" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="128" y="434" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">mgmt-vm-1</text>
<text x="128" y="450" text-anchor="middle" font-size="12" fill="#712B13">control-plane · .200</text>
<rect x="252" y="412" width="176" height="52" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
